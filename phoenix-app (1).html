  const SUPABASE_URL      = "";
  const SUPABASE_ANON_KEY = "";

<script>
(function(){
  var TABLE="shared_kv";
  var connected=!!(SUPABASE_URL&&SUPABASE_ANON_KEY);
  function Hd(x){ return Object.assign({apikey:SUPABASE_ANON_KEY,Authorization:"Bearer "+SUPABASE_ANON_KEY,"Content-Type":"application/json"},x||{}); }
  async function sbGet(k){ var r=await fetch(SUPABASE_URL+"/rest/v1/"+TABLE+"?select=v&k=eq."+encodeURIComponent(k),{headers:Hd()}); var a=await r.json(); return (a&&a[0])?{key:k,value:a[0].v}:null; }
  async function sbList(p){ var r=await fetch(SUPABASE_URL+"/rest/v1/"+TABLE+"?select=k&k=like."+encodeURIComponent(p)+"*",{headers:Hd()}); var a=await r.json(); return {keys:(a||[]).map(function(x){return x.k;}),prefix:p}; }
  async function sbSet(k,v){ await fetch(SUPABASE_URL+"/rest/v1/"+TABLE,{method:"POST",headers:Hd({Prefer:"resolution=merge-duplicates"}),body:JSON.stringify({k:k,v:v,updated_at:new Date().toISOString()})}); return {key:k,value:v}; }
  async function sbDel(k){ await fetch(SUPABASE_URL+"/rest/v1/"+TABLE+"?k=eq."+encodeURIComponent(k),{method:"DELETE",headers:Hd()}); return {key:k,deleted:true}; }
  var local={
    get:function(k){ var v=localStorage.getItem("tt:"+k); return v==null?null:{key:k,value:v}; },
    set:function(k,v){ localStorage.setItem("tt:"+k,v); return {key:k,value:v}; },
    del:function(k){ localStorage.removeItem("tt:"+k); return {key:k,deleted:true}; },
    list:function(p){ var keys=[]; for(var i=0;i<localStorage.length;i++){var kk=localStorage.key(i); if(kk&&kk.indexOf("tt:"+p)===0)keys.push(kk.slice(3));} return {keys:keys,prefix:p}; }
  };
  window.storage={
    get:function(k,s){ return (s&&connected)?sbGet(k):Promise.resolve(local.get(k)); },
    set:function(k,v,s){ return (s&&connected)?sbSet(k,v):Promise.resolve(local.set(k,v)); },
    delete:function(k,s){ return (s&&connected)?sbDel(k):Promise.resolve(local.del(k)); },
    list:function(p,s){ p=p||""; return (s&&connected)?sbList(p):Promise.resolve(local.list(p)); }
  };
})();
</script>
